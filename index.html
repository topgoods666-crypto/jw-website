<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
}

/* 顶部导航 */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    font-weight: bold;
    position: fixed;
    width: 100%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(5px);
}

/* HERO */
.hero {
    position: relative;
    height: 90vh;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-text {
    position: absolute;
    left: 8%;
    bottom: 20%;
    color: white;
}

.hero-text h1 {
    font-size: 48px;
    margin: 0;
}

.hero-text p {
    margin-top: 10px;
    opacity: 0.8;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 25px;
    background: white;
    color: black;
    text-decoration: none;
    font-size: 14px;
}

/* 商品区 */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    padding: 80px 40px;
}

.card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    display: block;
    transition: 0.4s;
}

.card img.hover {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
}

.card:hover img.hover {
    opacity: 1;
}

.card:hover img.main {
    opacity: 0;
}

/* 文案 */
.title {
    margin-top: 10px;
    font-size: 14px;
}

.price {
    color: #777;
    font-size: 13px;
}
</style>

</head>

<body>

<!-- 顶部 -->
<div class="header">
    <div>JW Studio</div>
    <div>Collection</div>
</div>

<!-- 首图 -->
<div class="hero">
    <img src="hero2.jpg">
    <div class="hero-text">
        <h1>98 One Shoulder Tee</h1>
        <p>Simple. Clean. Effortless Style.</p>
        <a href="#collection" class="btn">Shop Now</a>
    </div>
</div>

<!-- 商品 -->
<div id="collection" class="grid">

    <!-- 产品1 -->
    <div class="card">
        <img src="p1-a.png" class="main">
        <img src="p1-b.png" class="hover">
        <div class="title">One Shoulder Tee</div>
        <div class="price">Rp129.000</div>
    </div>

    <!-- 产品2 -->
    <div class="card">
        <img src="p2-a.png" class="main">
        <img src="p2-b.png" class="hover">
        <div class="title">Street Graphic Tee</div>
        <div class="price">Rp139.000</div>
    </div>

</div>

</body>
</html>
