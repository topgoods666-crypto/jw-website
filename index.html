<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Studio</title>

<style>
body{
    margin:0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background:#fff;
    color:#111;
}

/* 顶部 */
.header{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    font-size:12px;
    letter-spacing:2px;
    background:white;
    z-index:10;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 淡遮罩（更高级） */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* 文案 */
.hero-text{
    position:relative;
    z-index:2;
    color:white;
    text-align:center;
}

.hero-text h1{
    font-size:72px;
    font-weight:300;
    letter-spacing:2px;
    margin:0;
}

.hero-text p{
    margin-top:15px;
    font-size:14px;
    opacity:0.8;
    letter-spacing:1px;
}

.btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 30px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    font-size:12px;
}

/* SECTION 标题 */
.section{
    padding:120px 80px;
}

.section-title{
    font-size:14px;
    letter-spacing:3px;
    margin-bottom:40px;
}

/* 商品（画廊风🔥） */
.product{
    margin-bottom:120px;
}

.product img{
    width:100%;
    display:block;
}

/* hover微变化（更克制） */
.product:hover img{
    opacity:0.9;
}

/* 产品信息 */
.product-info{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

/* 左右错位布局（高级关键🔥） */
.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:80px;
}

.product:nth-child(2){
    margin-top:120px;
}

/* LOOKBOOK */
.lookbook{
    padding:120px 80px;
}

.lookbook img{
    width:100%;
    height:80vh;
    object-fit:cover;
}

/* FOOTER */
.footer{
    padding:80px;
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    color:#777;
}
</style>

</head>

<body>

<div class="header">
    <div>JW STUDIO</div>
    <div>COLLECTION</div>
</div>

<!-- HERO -->
<section class="hero">
    <img src="hero2.png">
    <div class="hero-text">
        <h1>98</h1>
        <p>ONE SHOULDER TEE</p>
        <a href="#collection" class="btn">SHOP</a>
    </div>
</section>

<!-- COLLECTION -->
<section id="collection" class="section">

    <div class="section-title">COLLECTION</div>

    <div class="layout">

        <!-- 产品1 -->
        <div class="product">
            <img src="p1-a.png">
            <div class="product-info">
                <span>One Shoulder Tee</span>
                <span>Rp79.000</span>
            </div>
        </div>

        <!-- 产品2 -->
        <div class="product">
            <img src="p2-a.png">
            <div class="product-info">
                <span>Street Graphic Tee</span>
                <span>Rp109.000</span>
            </div>
        </div>

    </div>

</section>

<!-- LOOKBOOK -->
<section class="lookbook">
    <img src="p1-b.png">
</section>

<!-- FOOTER -->
<div class="footer">
    JW STUDIO — INDONESIA
</div>

</body>
</html>
