<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Studio</title>

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #fff;
    color: #111;
}

/* 顶部 */
.header {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    z-index: 10;
    font-size: 13px;
    letter-spacing: 1px;
}

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: zoom 12s ease-in-out infinite alternate;
}

/* 缓慢放大动画（高级感🔥） */
@keyframes zoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.08); }
}

/* 渐变遮罩 */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
}

/* 文案动画 */
.hero-text {
    position: absolute;
    bottom: 15%;
    left: 8%;
    color: white;
    z-index: 2;
    max-width: 400px;
    animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.hero-text h1 {
    font-size: 60px;
    margin: 0;
    line-height: 1.1;
}

.hero-text p {
    margin-top: 15px;
    opacity: 0.85;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: white;
    color: black;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
}

/* 商品区 */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 50px;
    padding: 120px 80px;
}

.card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    display: block;
    transition: 0.5s;
}

.card img.hover {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
}

.card:hover img.hover {
    opacity: 1;
}

.card:hover img.main {
    opacity: 0;
}

/* 悬浮放大（关键🔥） */
.card:hover {
    transform: scale(1.03);
    transition: 0.4s;
}

/* 文案 */
.title {
    margin-top: 14px;
    font-size: 15px;
}

.price {
    color: #777;
    font-size: 13px;
}

/* 滚动出现动画 */
.card {
    opacity: 0;
    transform: translateY(40px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
    transition: 0.8s;
}
</style>

</head>

<body>

<div class="header">
    <div>JW STUDIO</div>
    <div>COLLECTION</div>
</div>

<!-- HERO -->
<div class="hero">
    <img src="hero2.png">
    <div class="hero-text">
        <h1>98 One Shoulder</h1>
        <p>Clean fit. Soft feel. Everyday style.</p>
        <a href="#collection" class="btn">SHOP NOW</a>
    </div>
</div>

<!-- 商品 -->
<div id="collection" class="grid">

    <div class="card">
        <img src="p1-a.png" class="main">
        <img src="p1-b.png" class="hover">
        <div class="title">One Shoulder Tee</div>
        <div class="price">Rp129.000</div>
    </div>

    <div class="card">
        <img src="p2-a.png" class="main">
        <img src="p2-b.png" class="hover">
        <div class="title">Street Graphic Tee</div>
        <div class="price">Rp139.000</div>
    </div>

</div>

<script>
/* 滚动动画 */
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
