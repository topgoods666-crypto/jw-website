<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>JW Studio | Womens Tops</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f6f1eb] text-[#1b1713]">

<header class="fixed top-0 left-0 w-full z-50 bg-[#f6f1eb]/90 backdrop-blur border-b border-black/10">
  <div class="h-16 px-5 md:px-12 flex items-center justify-between">
    <div class="text-xl font-semibold tracking-[0.25em]">JW STUDIO</div>
    <nav class="hidden md:flex gap-8 text-xs uppercase tracking-[0.25em]">
      <a href="#collection">Collection</a>
      <a href="#detail">Detail</a>
      <a href="#about">About</a>
    </nav>
    <div class="text-xs uppercase tracking-[0.2em]">Indonesia</div>
  </div>
</header>

<section class="min-h-screen pt-16 grid md:grid-cols-2">
  <div class="px-6 md:px-16 py-20 flex flex-col justify-center">
    <p class="text-xs uppercase tracking-[0.35em] text-[#8b684b] mb-6">One Shoulder Series</p>
    <h1 class="text-5xl md:text-7xl font-serif leading-none mb-8">
      Simple<br>
      Tapi Chic.
    </h1>
    <p class="text-lg md:text-xl uppercase tracking-[0.18em] mb-6">
      Atasan One Shoulder
    </p>
    <p class="text-gray-600 max-w-md leading-relaxed">
      Tampilan kasual yang tetap standout.
    </p>
  </div>

  <div class="relative min-h-[680px] bg-[#eadfd3] overflow-hidden">
    <img src="hero2.png" class="w-full h-full object-cover" />
  </div>
</section>

<section id="collection" class="px-5 md:px-12 py-24">

  <div class="grid md:grid-cols-2 gap-8">

    <div class="group bg-[#fffaf5]">
      <div class="relative aspect-[4/5] overflow-hidden">
        <img src="p1-a.png" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0">
        <img src="p1-b.png" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500 group-hover:opacity-100">
      </div>
      <div class="p-6 flex justify-between">
        <h3>White 98 One Shoulder</h3>
        <p>M / L / XL</p>
      </div>
    </div>

    <div class="group bg-[#fffaf5]">
      <div class="relative aspect-[4/5] overflow-hidden">
        <img src="p2-a.png" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0">
        <img src="p2-b.png" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500 group-hover:opacity-100">
      </div>
      <div class="p-6 flex justify-between">
        <h3>Black 98 One Shoulder</h3>
        <p>M / L / XL</p>
      </div>
    </div>

  </div>

</section>

<section class="px-5 md:px-12 py-24">
  <div class="grid md:grid-cols-3 gap-8">
    <div class="md:col-span-2">
      <img src="lookbook-1.png" class="w-full h-[680px] object-cover">
    </div>
    <div class="flex flex-col justify-between gap-8">
      <img src="lookbook-2.png" class="w-full h-[320px] object-cover">
      <img src="lookbook-3.png" class="w-full h-[320px] object-cover">
    </div>
  </div>
</section>

<footer class="px-6 md:px-12 py-10 text-center text-sm">
  JW STUDIO
</footer>

</body>
</html>
