<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Studio</title>

<style>
body{
    margin:0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background:#fff;
    color:#111;
}

/* NAV */
.nav{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    font-size:12px;
    letter-spacing:2px;
    background:white;
    z-index:10;
}

/* HERO */
.hero{
    height:100vh;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* FOG关键：非常淡的遮罩 */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.18);
}

/* 中心文案 */
.hero-text{
    position:relative;
    z-index:2;
    color:white;
    text-align:center;
}

.hero-text h1{
    font-size:80px;
    font-weight:300;
    letter-spacing:4px;
    margin:0;
}

.hero-text p{
    margin-top:12px;
    font-size:12px;
    letter-spacing:3px;
    opacity:0.85;
}

.btn{
    margin-top:20px;
    display:inline-block;
    padding:10px 26px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    font-size:11px;
    letter-spacing:2px;
}

/* SECTION */
.section{
    padding:160px 120px;
}

/* 标题 */
.label{
    font-size:11px;
    letter-spacing:3px;
    margin-bottom:40px;
    color:#888;
}

/* GRID（极简） */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:100px;
}

/* PRODUCT */
.product img{
    width:100%;
}

/* hover极轻（FOG风） */
.product:hover img{
    opacity:0.92;
    transition:0.4s;
}

/* INFO */
.info{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
    letter-spacing:1px;
}

/* LOOKBOOK（整屏） */
.lookbook{
    height:90vh;
    margin-top:120px;
}

.lookbook img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* FOOTER */
.footer{
    padding:100px;
    text-align:center;
    font-size:11px;
    letter-spacing:2px;
    color:#777;
}
</style>

</head>

<body>

<div class="nav">
    <div>JW STUDIO</div>
    <div>COLLECTION</div>
</div>

<!-- HERO -->
<section class="hero">
    <img src="hero2.png">
    <div class="hero-text">
        <h1>98</h1>
        <p>ONE SHOULDER TEE</p>
        <a href="#collection" class="btn">SHOP</a>
    </div>
</section>

<!-- COLLECTION -->
<section id="collection" class="section">

    <div class="label">COLLECTION</div>

    <div class="grid">

        <div class="product">
            <img src="p1-a.png">
            <div class="info">
                <span>ONE SHOULDER TEE</span>
                <span>Rp129.000</span>
            </div>
        </div>

        <div class="product">
            <img src="p2-a.png">
            <div class="info">
                <span>GRAPHIC TEE</span>
                <span>Rp139.000</span>
            </div>
        </div>

    </div>

</section>

<!-- LOOKBOOK -->
<section class="lookbook">
    <img src="p1-b.png">
</section>

<!-- FOOTER -->
<div class="footer">
    JW STUDIO — INDONESIA
</div>

</body>
</html>
