<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* 顶部 */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    font-weight: bold;
}

/* 首图 */
.hero2 {
    width: 100%;
    height: 80vh;
    background: url('hero2.png') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 32px;
}

/* 产品 */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 40px;
}

.card {
    position: relative;
    overflow: hidden;
}

.card img {
    width: 100%;
    display: block;
}

.card img.hover {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: 0.4s;
}

.card:hover img.hover {
    opacity: 1;
}

.title {
    margin-top: 10px;
    font-size: 14px;
}

.price {
    color: #888;
    font-size: 13px;
}
</style>

</head>
<body>

<div class="header">
    <div>JW Studio</div>
    <div>Collection</div>
</div>

<div class="hero2">
    Everyday Cotton
</div>

<div class="grid">

    <!-- 产品1 -->
    <div class="card">
        <img src="p1-a.png">
        <img class="hover" src="p1-b.png">
        <div class="title">One Shoulder Tee 98</div>
        <div class="price">Rp 129.000</div>
    </div>

    <!-- 产品2 -->
    <div class="card">
        <img src="p2-a.png">
        <img class="hover" src="p2-b.png">
        <div class="title">Vintage Graphic Tee</div>
        <div class="price">Rp 139.000</div>
    </div>

</div>

</body>
</html>
